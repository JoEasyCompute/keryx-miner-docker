services:
  keryx-miner:
    build:
      context: .
      args:
        KERYX_MINER_VERSION: ${KERYX_MINER_VERSION:-v0.3.5-OPoI}
        KERYX_MINER_SHA256: ${KERYX_MINER_SHA256:-c9770a52a7c41c4e17b20cb643b5e5c13e40b8bda9293a7d04e95c866c644b93}
        KERYX_IMAGE_PLATFORM: linux/amd64
    image: keryx-miner:local
    platform: linux/amd64
    restart: unless-stopped
    environment:
      MINING_ADDRESS: ${MINING_ADDRESS:?Set MINING_ADDRESS in .env}
      KERYX_INFERENCE_TIER: ${KERYX_INFERENCE_TIER:-default}
      KERYX_NO_OPOI: ${KERYX_NO_OPOI:-false}
      KERYX_EXTRA_ARGS: ${KERYX_EXTRA_ARGS:-}
      KERYX_GPU_TUNING: ${KERYX_GPU_TUNING:-false}
      KERYX_GPU_PRESET: ${KERYX_GPU_PRESET:-none}
      KERYX_GPU_PRESETS_ENABLE: ${KERYX_GPU_PRESETS_ENABLE:-false}
      KERYX_GPU_PRESETS_URL: ${KERYX_GPU_PRESETS_URL:-}
      KERYX_GPU_PRESETS_FILE: ${KERYX_GPU_PRESETS_FILE:-/etc/keryx/gpu-presets.csv}
      KERYX_GPU_PRESETS_SHA256: ${KERYX_GPU_PRESETS_SHA256:-}
      KERYX_GPU_PRESETS_DRY_RUN: ${KERYX_GPU_PRESETS_DRY_RUN:-false}
      KERYX_GPU_PRESETS_TIMEOUT: ${KERYX_GPU_PRESETS_TIMEOUT:-10}
      KERYX_GPU_PRESETS_ALGORITHM: ${KERYX_GPU_PRESETS_ALGORITHM:-keryx}
      KERYX_GPU_DEVICES: ${KERYX_GPU_DEVICES:-}
      KERYX_GPU_POWER_LIMIT: ${KERYX_GPU_POWER_LIMIT:-}
      KERYX_GPU_POWER_LIMIT_PERCENT: ${KERYX_GPU_POWER_LIMIT_PERCENT:-}
      KERYX_GPU_LOCK_CORE_CLOCK: ${KERYX_GPU_LOCK_CORE_CLOCK:-}
      KERYX_GPU_LOCK_MEMORY_CLOCK: ${KERYX_GPU_LOCK_MEMORY_CLOCK:-}
      KERYX_GPU_CORE_CLOCK_OFFSET: ${KERYX_GPU_CORE_CLOCK_OFFSET:-}
      KERYX_GPU_MEMORY_CLOCK_OFFSET: ${KERYX_GPU_MEMORY_CLOCK_OFFSET:-}
      KERYX_GPU_USE_NVIDIA_SETTINGS: ${KERYX_GPU_USE_NVIDIA_SETTINGS:-false}
      KERYX_GPU_RESET_CLOCKS_FIRST: ${KERYX_GPU_RESET_CLOCKS_FIRST:-false}
      KERYX_GPU_TUNING_STRICT: ${KERYX_GPU_TUNING_STRICT:-false}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - keryx-data:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  keryx-data:
